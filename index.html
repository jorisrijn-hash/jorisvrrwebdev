input:not([type=range]),textarea,.win-body [contenteditable]{cursor:text}
button{font-family:inherit;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
a{color:var(--accent-bright);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent);color:#fff}

/* ============================ SCREEN ============================ */
#screen{position:fixed;inset:0;overflow:hidden}
#wallpaper{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(120% 90% at 50% 0%, #6aa9ec, transparent 55%),
    linear-gradient(180deg,#3f86dc 0%,#2f74d4 45%,#1f5cc0 100%);
}
#wallpaper::after{
  content:"";position:absolute;left:0;right:0;top:0;height:18%;pointer-events:none;opacity:.5;
  background:radial-gradient(80% 100% at 50% 0%, rgba(255,255,255,.4), transparent 70%);
}
#wallpaper .glow{
  position:absolute;width:60vmax;height:34vmax;left:50%;top:-10vmax;transform:translateX(-50%);border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.28),transparent 64%);filter:blur(14px);opacity:.8;
}
#wallpaper.flat .glow,#wallpaper.flat::after{display:none}

/* ============================ MENU BAR ============================ */
#menubar{
  position:absolute;top:0;left:0;right:0;height:var(--menu-h);z-index:9000;
  display:flex;align-items:center;gap:2px;padding:0 10px;
  background:linear-gradient(180deg,rgba(249,250,252,.86),rgba(238,241,246,.8));
  backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
  border-bottom:1px solid rgba(0,0,0,.12);box-shadow:0 1px 0 rgba(255,255,255,.7) inset;
  font-size:13px;
}
#menubar .mb-logo{display:flex;align-items:center;gap:6px;padding:0 8px;margin-right:6px;height:22px;border-radius:6px;font-weight:700;background:transparent}
#menubar .mb-logo #mb-mark svg{display:block}
#menubar .mb-logo svg{display:block}
#menubar .mb-logo b{font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:-.01em;color:#1b2733}
#menubar .mb-item{padding:4px 10px;border-radius:5px;height:21px;display:flex;align-items:center;font-weight:500;color:#2a3540;position:relative}
#menubar .mb-item:hover,#menubar .mb-item.open{background:var(--accent);color:#fff}
#menubar .mb-spacer{flex:1}
#menubar .mb-stat{display:flex;align-items:center;gap:13px;padding-right:6px;color:#4a5560;font-family:var(--mono);font-size:12px}
#menubar .mb-stat .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
#menubar .mb-stat .seg{display:flex;align-items:center;gap:5px}
#menubar .mb-clock{min-width:148px;text-align:right;letter-spacing:.02em}
#menubar .mb-snd{cursor:pointer;width:24px;text-align:center;border-radius:5px;padding:3px 0}
#menubar .mb-snd:hover{background:rgba(0,0,0,.08)}

/* dropdown menus */
.mb-menu{
  position:absolute;top:calc(var(--menu-h) - 2px);min-width:230px;z-index:9100;
  background:rgba(250,250,248,.97);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid rgba(0,0,0,.16);border-radius:9px;padding:6px;
  box-shadow:0 16px 40px rgba(20,50,100,.3);animation:menupop .12s ease;color:#1f2730;
}
@keyframes menupop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.mb-menu button{display:flex;width:100%;align-items:center;justify-content:space-between;gap:18px;background:none;border:0;text-align:left;padding:7px 10px;border-radius:6px;font-size:13.5px;color:#2a3540}
.mb-menu button:hover{background:var(--accent);color:#fff}
.mb-menu button .k{font-family:var(--mono);font-size:11px;color:#6a7682}
.mb-menu button:hover .k{color:#eaf2ff}
.mb-menu .div{height:1px;background:rgba(0,0,0,.12);margin:5px 6px}
.mb-menu .head{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#8a96a2;padding:6px 10px 3px}

/* ============================ DESKTOP ICONS ============================ */
#desktop{position:absolute;inset:var(--menu-h) 0 0 0;z-index:10}
#icon-layer{
  position:absolute;top:18px;left:14px;bottom:calc(var(--dock-h) + 10px);
  display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:4px;
}
.desk-icon{
  width:92px;padding:10px 6px 8px;border-radius:9px;display:flex;flex-direction:column;align-items:center;gap:7px;
  background:transparent;border:1px solid transparent;text-align:center;transition:background .12s,border-color .12s,transform .08s;
}
.desk-icon:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.desk-icon:active{transform:scale(.95)}
.desk-icon.sel{background:var(--accent-soft);border-color:var(--accent)}
.desk-icon .pix{width:46px;height:46px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5))}
.desk-icon .lbl{font-family:var(--pixel);font-size:9.5px;line-height:1.35;color:var(--ink);letter-spacing:.01em;text-shadow:0 1px 2px rgba(0,0,0,.7)}

/* ============================ WINDOWS ============================ */
.window{
  position:absolute;z-index:100;display:flex;flex-direction:column;min-width:260px;min-height:160px;
  background:var(--glass);backdrop-filter:blur(26px) saturate(1.25);-webkit-backdrop-filter:blur(26px) saturate(1.25);
  border:1px solid var(--line-strong);border-radius:12px;box-shadow:var(--winshadow);overflow:hidden;
  animation:winopen .2s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes winopen{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:none}}
.window.closing{animation:winclose .16s ease forwards}
@keyframes winclose{to{opacity:0;transform:scale(.92) translateY(6px)}}
.window.min{animation:winmin .22s ease forwards}
@keyframes winmin{to{opacity:0;transform:scale(.2) translateY(60vh)}}
.window.focused{box-shadow:var(--winshadow),0 0 0 1px var(--accent)}
.window.maxed{border-radius:0}

/* ---- light "paper" palette scoped to window interiors (dark desktop / light docs) ---- */
.window{
  --panel:#FFFFFF; --panel-2:#F0F0EC; --field:#FFFFFF; --bg:#F8F8F6;
  --ink:#1C1C1C; --ink-soft:#3C3C3C; --muted:#787870; --faint:#A6A69E;
  --line:#DEDED8; --line-strong:#C4C4BC; --hover:#EAF1FB;
  --glass:#FFFFFF; --glass-2:#F0F0EC;
  --accent-soft:rgba(47,116,216,.12);
  --ok:#2C8C3A; --ok-bg:rgba(44,140,58,.14);
  --bad:#CC3B2B; --bad-bg:rgba(204,59,43,.12);
  --warn:#B07A12;
  color:var(--ink);
}
.window input,.window select,.window textarea{color-scheme:light}

.win-bar{
  height:38px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 12px;cursor:grab;
  background:linear-gradient(180deg,#fcfcfb,#dedeD7);
  border-bottom:1px solid #b6b6af;box-shadow:0 1px 0 rgba(255,255,255,.7) inset;
}
.win-bar:active{cursor:grabbing}
.traffic{display:flex;gap:8px;align-items:center}
.traffic span{width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(0,0,0,0);border:.5px solid rgba(0,0,0,.35);transition:color .1s}
.traffic span.c{background:#ED6A5E}.traffic span.m{background:#F4BD4E}.traffic span.g{background:#62C554}
.traffic:hover span{color:rgba(0,0,0,.55)}
.win-title{font-family:var(--display);font-weight:600;font-size:13.5px;letter-spacing:-.01em;color:var(--ink);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:46px}
.win-title .ti{margin-right:7px;opacity:.9;font-family:var(--pixel);font-size:10px;color:var(--accent)}
.win-body{flex:1;overflow:auto;background:var(--bg);position:relative}
.win-body::-webkit-scrollbar{width:11px;height:11px}
.win-body::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
.win-body::-webkit-scrollbar-thumb:hover{background:var(--muted);background-clip:padding-box;border:3px solid transparent}
.resize{position:absolute;width:18px;height:18px;right:0;bottom:0;cursor:nwse-resize;z-index:6}
.resize::after{content:"";position:absolute;right:3px;bottom:3px;width:8px;height:8px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);border-radius:0 0 3px 0;opacity:.7}
.resize-x{position:absolute;top:34px;right:-1px;width:8px;height:calc(100% - 52px);cursor:ew-resize;z-index:5}
.resize-y{position:absolute;left:0;bottom:-1px;height:8px;width:calc(100% - 18px);cursor:ns-resize;z-index:5}

/* ============================ DOCK ============================ */
#dock-wrap{position:absolute;left:0;right:0;bottom:10px;z-index:8000;display:flex;justify-content:center;pointer-events:none}
#dock{
  pointer-events:auto;display:flex;align-items:flex-end;gap:6px;padding:8px 12px;height:var(--dock-h);
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(214,228,246,.4));
  backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);
  border:1px solid rgba(255,255,255,.65);border-radius:18px;
  box-shadow:0 16px 40px rgba(20,60,120,.32),0 1px 0 rgba(255,255,255,.8) inset;
}
.dock-item{position:relative;width:50px;height:50px;display:flex;align-items:flex-end;justify-content:center;transition:transform .16s cubic-bezier(.3,.7,.3,1.4);transform-origin:bottom center}
.dock-item .pix{width:46px;height:46px;filter:drop-shadow(0 4px 5px rgba(0,0,0,.55));transition:width .16s,height .16s}
.dock-item:hover{transform:translateY(-10px) scale(1.32)}
.dock-item:hover+.dock-item,.dock-item:has(+ :hover){transform:translateY(-4px) scale(1.12)}
.dock-item .run{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent-bright);box-shadow:0 0 6px var(--accent-bright);opacity:0;transition:opacity .15s}
.dock-item.running .run{opacity:1}
.dock-item .tip{
  position:absolute;bottom:62px;left:50%;transform:translateX(-50%) scale(.9);transform-origin:bottom center;
  background:rgba(255,255,255,.97);border:1px solid rgba(0,0,0,.12);color:#1f2730;font-family:var(--mono);font-size:9.5px;
  padding:5px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s,transform .12s;
  box-shadow:0 8px 20px rgba(20,60,120,.28);
}
.dock-item:hover .tip{opacity:1;transform:translateX(-50%) scale(1)}
.dock-sep{width:1px;height:42px;background:rgba(0,0,0,.12);margin:0 5px;align-self:center}

/* ============================ GENERIC UI (shared) ============================ */
.pad{padding:22px 24px}
.pad-lg{padding:28px 30px}
.btn{border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);padding:9px 15px;border-radius:8px;font-size:13.5px;font-weight:550;display:inline-flex;align-items:center;gap:7px;transition:.12s;white-space:nowrap}
.btn:hover{background:var(--hover);border-color:var(--muted)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(180deg,#6aa9ec,#2f74d4);color:#fff;border-color:#2461b8;font-weight:650}
.btn-primary:hover{background:linear-gradient(180deg,#7fb8f2,#3a82e0);border-color:#2461b8}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
.btn-ghost{border-color:transparent;background:none;color:var(--muted)}
.btn-ghost:hover{background:var(--hover);color:var(--ink)}
.eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:600;display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";width:20px;height:2px;background:var(--accent);border-radius:2px;flex-shrink:0}
h1,h2,h3,h4{margin:0;font-family:var(--display);font-weight:600;letter-spacing:-.02em;line-height:1.2}
.win-body p{margin:0 0 12px;max-width:62ch;color:var(--ink-soft)}
.win-body p:last-child{margin-bottom:0}
.muted{color:var(--muted)}
.tiny{font-size:12px}
.tag{display:inline-flex;align-items:center;font-family:var(--mono);font-size:11px;color:var(--ink-soft);background:var(--hover);border:1px solid var(--line);padding:3px 9px;border-radius:6px;margin:0 5px 5px 0}
.tag.accent{color:var(--accent-bright);border-color:rgba(210,116,47,.4);background:var(--accent-soft)}
.divider{height:1px;background:var(--line);margin:20px 0}
.kv{display:grid;grid-template-columns:120px 1fr;gap:6px 16px;font-size:13.5px}
.kv dt{color:var(--muted);font-family:var(--mono);font-size:12px}
.kv dd{margin:0;color:var(--ink)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:5px}
.field .help{font-size:11.5px;color:var(--faint);margin-top:4px}
input[type=text],input[type=number],input[type=email],input[type=tel],select,textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:8px;background:var(--field);color:var(--ink);color-scheme:dark
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
textarea{resize:vertical;min-height:84px;line-height:1.5}
.err{border-color:var(--bad) !important}
.errmsg{color:var(--bad);font-size:11.5px;margin-top:4px;display:none}
.errmsg.show{display:block}
.toast-host{position:fixed;left:50%;bottom:calc(var(--dock-h) + 24px);transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:9px;font-size:13.5px;font-weight:550;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ============================ BOOT ============================ */
#boot{position:fixed;inset:0;z-index:99999;background:#0a0a0a;transition:opacity .5s}
#boot #bstage1{background:linear-gradient(180deg,#dcdcd6,#bcbcb5)}
#boot #bstage2{background:radial-gradient(120% 90% at 50% 0%,#6aa9ec,transparent 55%),linear-gradient(180deg,#3f86dc,#1f5cc0)}
#boot.gone{opacity:0;pointer-events:none}
#boot .boot-stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
#boot .boot-stage.active{opacity:1}
#boot .boot-logo{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;margin-bottom:30px}
#boot .boot-logo::before{content:"";position:absolute;width:190px;height:190px;border-radius:50%;
  background:radial-gradient(circle,rgba(47,116,216,.32),rgba(47,116,216,.1) 45%,transparent 68%);
  filter:blur(8px);animation:blGlow 2.6s ease-in-out infinite}
#boot .boot-logo svg{width:120px;height:120px;position:relative;z-index:1}
#boot .bl-arrow{transform-origin:50% 50%;animation:blFloat 3.2s ease-in-out .9s infinite}
#boot .f{opacity:0;transform:translateY(10px) scale(.86);transform-origin:50% 46%;animation:blIn .62s cubic-bezier(.2,.85,.25,1) forwards}
#boot .f1{animation-delay:.12s}#boot .f2{animation-delay:.30s}#boot .f3{animation-delay:.48s}
#boot .boot-bar{width:210px;height:5px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden}
#boot .boot-bar i{display:block;height:100%;width:4%;border-radius:5px;background:linear-gradient(90deg,#2f74d4,#5a9ef0);transition:width 1.5s cubic-bezier(.5,.1,.2,1)}
#boot .boot-ver{position:absolute;bottom:26px;font-family:var(--mono);font-size:11px;color:#5a5f63;letter-spacing:.12em}

.wp.sel{border-color:var(--accent)}

/* ============================ QUOTATION (printable) ============================ */
.quotation{background:#fff;color:#1A1712;border-radius:10px;overflow:hidden;font-size:12px;line-height:1.5}
.quotation .qhead{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 24px 14px;border-bottom:1.5px solid #1A1712}
.quotation .qbiz{font-family:var(--display);font-size:17px;font-weight:600}
.quotation .qbiz small{display:block;font-weight:400;color:#555;font-size:10.5px;margin-top:4px;line-height:1.6}
.quotation .qno{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#777;text-align:right}
.quotation .qtitle{font-family:var(--display);font-size:28px;font-weight:600;color:#B85A28;padding:18px 24px 6px}
.quotation .qto{padding:0 24px 14px;font-size:11px;color:#444;line-height:1.6}
.quotation table{width:100%;border-collapse:collapse;margin:0}
.quotation th{text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #1A1712;padding:8px 24px;color:#1A1712}
.quotation th.r,.quotation td.r{text-align:right}
.quotation td{padding:9px 24px;border-bottom:1px solid #E3E1DB;font-size:11px}
.quotation td.m{font-family:var(--mono);white-space:nowrap}
.quotation .qtot{padding:10px 24px 4px;margin-left:auto;width:62%}
.quotation .qtr{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;padding:4px 0;color:#333}
.quotation .qtr.g{border-top:1.5px solid #1A1712;font-weight:700;font-size:14px;padding-top:8px;margin-top:3px;color:#1A1712}
.quotation .qfoot{padding:14px 24px 20px;font-size:10px;color:#666;border-top:1px solid #E3E1DB;margin-top:8px;line-height:1.6}

/* ============================ MOBILE ============================ */
.mobile-tag{display:none}
@media (max-width:780px){
  :root{--dock-h:64px}
  #icon-layer{position:absolute;inset:14px 14px auto 14px;flex-direction:row;flex-wrap:wrap;align-content:flex-start;gap:6px}
  .desk-icon{width:calc(25% - 5px);padding:12px 4px}
  #menubar .mb-clock{min-width:auto}
  #menubar .mb-stat .hideMob{display:none}
  .window{border-radius:14px 14px 0 0 !important;animation:sheetup .26s cubic-bezier(.2,.8,.3,1)}
  @keyframes sheetup{from{transform:translateY(100%)}to{transform:none}}
  .window .resize,.window .resize-x,.window .resize-y{display:none}
  .win-bar{height:44px}
  .qb{grid-template-columns:1fr;height:auto}
  .qb-left{border-right:0;border-bottom:1px solid var(--line)}
  .contact-grid{grid-template-columns:1fr}
  .about-hero{flex-direction:column;gap:14px}
  .stat-row{flex-wrap:wrap}.stat-row .s{flex:1 0 40%;border-bottom:1px solid var(--line)}
  #dock{gap:2px;padding:7px 9px}
  .dock-item{width:42px;height:42px}.dock-item .pix{width:38px;height:38px}
  .dock-item:hover{transform:none}.dock-item:hover .tip{opacity:0}
  .dock-item.dock-hide-mobile{display:none}
}

@media print{
  body *{visibility:hidden}
  #print-root,#print-root *{visibility:visible}
  #print-root{position:fixed;inset:0;background:#fff;padding:0;overflow:visible}
  .quotation{border-radius:0;box-shadow:none}
  @page{size:A4;margin:16mm}
}

/* calc(): split one-time vs recurring + grand totals. Identical math to HQ. */
function calc(regels){
  let eenmalig=0, maandelijks=0, uur=0;
  (regels||[]).forEach(r=>{
    const sub=(r.prijs||0)*(r.aantal||1);
    if(r.type==='maandelijks') maandelijks+=sub;
    else if(r.type==='uur') uur+=sub;
    else eenmalig+=sub;
  });
  const tarief=(ENGINE.settings.btwTarief||0)/100;
  const nu=eenmalig+uur, alles=eenmalig+uur+maandelijks;
  return { eenmalig, uur, maandelijks,
    nuSub:nu, nuBtw:nu*tarief, nuTot:nu*(1+tarief),
    mndSub:maandelijks, mndBtw:maandelijks*tarief, mndTot:maandelijks*(1+tarief),
    allSub:alles, allBtw:alles*tarief, allTot:alles*(1+tarief) };
}

/* ========================= WINDOW MANAGER ========================= */
const APPS={
  welcome:     {title:'Welkom',            icon:'home',         w:560,h:560},
  about:       {title:'Over mij',          icon:'about',        w:560,h:520},
  projects:    {title:'Mijn werk',         icon:'projects',     w:600,h:330},
  services:    {title:'Wat ik voor je doe',icon:'services',     w:640,h:560},
  quote:       {title:'Prijzen & offerte', icon:'quote',        w:780,h:580},
  messages:    {title:'Kenai',             icon:'messages',     w:480,h:560},
  contact:     {title:'Contact',           icon:'contact',      w:600,h:520},
  terminal:    {title:'Terminal',          icon:'terminal',     w:600,h:400},
  settings:    {title:'Instellingen',      icon:'settings',     w:520,h:460}
};
const ALIAS={pricing:'quote'};
const WIN={}; let zTop=100; let openOrder=[];
const isMobile=()=>window.matchMedia('(max-width:780px)').matches;
const RENDER={}; /* app -> function(bodyEl) */

function openApp(appId,pos){
  const real=ALIAS[appId]||appId;
  if(WIN[real]){ if(WIN[real].minned) restoreWin(real); focusWin(real); return; }
  const meta=APPS[real]; if(!meta)return;
  const win=el('div','window'); win.dataset.app=real;
  const titleHtml=`<span class="ti">${meta.title.slice(0,1)}</span>${meta.title}`;
  win.innerHTML=`
    <div class="win-bar">
      <div class="traffic">
        <span class="c" title="Sluiten">×</span><span class="m" title="Minimaliseren">–</span><span class="g" title="Maximaliseren">+</span>
      </div>
      <div class="win-title">${titleHtml}</div>
    </div>
    <div class="win-body"></div>
    <div class="resize-x"></div>
    <div class="resize-y"></div>
    <div class="resize"></div>`;
  $('#screen').appendChild(win);
  const body=win.querySelector('.win-body');

  // size + position
  if(isMobile()){ layoutMobile(win); }
  else if(pos){
    const w=Math.min(pos.w||meta.w, window.innerWidth-20), h=Math.min(pos.h||meta.h, window.innerHeight-86);
    win.style.width=w+'px'; win.style.height=h+'px';
    win.style.left=Math.max(8,Math.min(pos.left, window.innerWidth-w-8))+'px';
    win.style.top=Math.max(40,Math.min(pos.top, window.innerHeight-h-78))+'px';
  }
  else {
    const w=Math.min(meta.w, window.innerWidth-40), h=Math.min(meta.h, window.innerHeight-90);
    const off=(openOrder.length%5)*26;
    win.style.width=w+'px'; win.style.height=h+'px';
    win.style.left=Math.max(14,(window.innerWidth-w)/2-60+off)+'px';
    win.style.top=Math.max(40,(window.innerHeight-h)/2-30+off)+'px';
  }
  WIN[real]={node:win,minned:false,maxed:false,prev:null};
  openOrder.push(real);
  // wire controls
  win.querySelector('.traffic .c').onclick=e=>{e.stopPropagation();closeWin(real);};
  win.querySelector('.traffic .m').onclick=e=>{e.stopPropagation();minWin(real);};
  win.querySelector('.traffic .g').onclick=e=>{e.stopPropagation();toggleMax(real);};
  win.addEventListener('mousedown',()=>focusWin(real));
  win.addEventListener('touchstart',()=>focusWin(real),{passive:true});
  enableDrag(win,win.querySelector('.win-bar'),real);
  enableResize(win,win.querySelector('.resize'),'xy');
  enableResize(win,win.querySelector('.resize-x'),'x');
  enableResize(win,win.querySelector('.resize-y'),'y');
  win.querySelector('.win-bar').addEventListener('dblclick',e=>{ if(!e.target.closest('.traffic')) toggleMax(real); });
  // content
  (RENDER[real]||(b=>b.innerHTML='<div class="pad">Coming soon.</div>'))(body,win);
  focusWin(real); markDock(); blip(660,.04);
  return win;
}
function layoutMobile(win){
  win.classList.add('maxed');
  win.style.left='0px'; win.style.top='var(--menu-h)';
  win.style.width='100vw';
  win.style.height='calc(100vh - var(--menu-h) - var(--dock-h) - 14px)';
}
function focusWin(id){ const w=WIN[id]; if(!w)return; w.node.style.zIndex=++zTop;
  Object.values(WIN).forEach(x=>x.node.classList.remove('focused')); w.node.classList.add('focused'); markDock(); }
function closeWin(id){ const w=WIN[id]; if(!w)return; w.node.classList.add('closing');
  setTimeout(()=>{ w.node.remove(); delete WIN[id]; openOrder=openOrder.filter(x=>x!==id); markDock(); },150); blip(420,.04); }
function minWin(id){ const w=WIN[id]; if(!w)return; w.node.classList.add('min'); w.minned=true;
  setTimeout(()=>{ w.node.style.display='none'; w.node.classList.remove('min'); markDock(); },220); }
function restoreWin(id){ const w=WIN[id]; if(!w)return; w.node.style.display='flex'; w.minned=false; focusWin(id); }
function toggleMax(id){ const w=WIN[id]; if(!w)return; const n=w.node;
  if(w.maxed){ Object.assign(n.style,w.prev); n.classList.remove('maxed'); w.maxed=false; }
  else { w.prev={left:n.style.left,top:n.style.top,width:n.style.width,height:n.style.height};
    n.classList.add('maxed'); n.style.left='8px'; n.style.top='calc(var(--menu-h) + 8px)';
    n.style.width='calc(100vw - 16px)'; n.style.height='calc(100vh - var(--menu-h) - var(--dock-h) - 22px)'; }
  focusWin(id);
}
function enableDrag(win,handle,id){
  let sx,sy,ox,oy,drag=false;
  const start=(cx,cy)=>{ const w=WIN[id]; if(w&&w.maxed)return false; drag=true; sx=cx;sy=cy;
    ox=parseFloat(win.style.left)||0; oy=parseFloat(win.style.top)||0; focusWin(id); return true; };
  const move=(cx,cy)=>{ if(!drag)return; let nx=ox+(cx-sx), ny=oy+(cy-sy);
    ny=Math.max(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--menu-h')),ny);
    nx=Math.min(Math.max(-win.offsetWidth+80,nx),window.innerWidth-60);
    win.style.left=nx+'px'; win.style.top=ny+'px'; };
  const end=()=>{drag=false;};
  handle.addEventListener('mousedown',e=>{ if(e.target.closest('.traffic'))return; if(start(e.clientX,e.clientY))e.preventDefault(); });
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',end);
  handle.addEventListener('touchstart',e=>{ if(e.target.closest('.traffic'))return; const t=e.touches[0]; start(t.clientX,t.clientY); },{passive:true});
  handle.addEventListener('touchmove',e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); },{passive:true});
  handle.addEventListener('touchend',end);
}
function enableResize(win,handle,mode){
  if(!handle) return; mode=mode||'xy';
  let sx,sy,ow,oh,rz=false;
  const start=(cx,cy)=>{ const id=win.dataset.app; const w=id&&WIN[id]; if(w&&w.maxed)return false; rz=true;sx=cx;sy=cy;ow=win.offsetWidth;oh=win.offsetHeight; if(id&&WIN[id])focusWin(id); return true; };
  const move=(cx,cy)=>{ if(!rz)return;
    if(mode!=='y') win.style.width=Math.max(280,ow+(cx-sx))+'px';
    if(mode!=='x') win.style.height=Math.max(180,oh+(cy-sy))+'px'; };
  const end=()=>{rz=false;};
  handle.addEventListener('mousedown',e=>{ if(start(e.clientX,e.clientY)){e.preventDefault();e.stopPropagation();} });
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',end);
  handle.addEventListener('touchstart',e=>{ const t=e.touches[0]; start(t.clientX,t.clientY); },{passive:true});
  handle.addEventListener('touchmove',e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); },{passive:false});
  handle.addEventListener('touchend',end);
}

const DOCK=[
  {app:'__home', label:'Bureaublad', icon:'home'},
  {sep:true},
  {app:'projects', label:'Mijn werk', icon:'projects'},
  {app:'services', label:'Wat ik doe', icon:'services'},
  {app:'quote', label:'Prijzen & offerte', icon:'quote'},
  {app:'messages', label:'Kenai', icon:'messages'},
  {app:'contact', label:'Contact', icon:'contact'},
  {sep:true},
  {app:'settings', label:'Instellingen', icon:'settings'}
];
const DESK=[
  {app:'welcome',label:'Welkom'},{app:'about',label:'Over mij'},{app:'projects',label:'Mijn werk'},{app:'services',label:'Wat ik doe'},
  {app:'quote',label:'Prijzen & offerte'},{app:'messages',label:'Kenai'},{app:'contact',label:'Contact'},
  {app:'terminal',label:'Terminal'}
];
function buildDock(){
  const d=$('#dock'); d.innerHTML='';
  DOCK.forEach(it=>{
    if(it.sep){ d.appendChild(el('div','dock-sep')); return; }
    const b=el('div','dock-item'+(it.app==='settings'?' dock-hide-mobile':''));
    b.innerHTML=`${ICONS[it.icon]()}<span class="run"></span><span class="tip">${it.label}</span>`;
    b.onclick=()=>{ if(it.app==='__home'){ Object.keys(WIN).forEach(id=>{ if(!WIN[id].minned)minWin(id); }); blip(520,.04); } else openApp(it.app); };
    b.dataset.app=it.app;
    d.appendChild(b);
  });
}
function markDock(){
  document.querySelectorAll('#dock .dock-item').forEach(b=>{
    const a=ALIAS[b.dataset.app]||b.dataset.app;
    b.classList.toggle('running', !!WIN[a] );
  });
}
function buildDesktop(){
  const l=$('#icon-layer'); l.innerHTML='';
  DESK.forEach(it=>{
    const b=el('div','desk-icon');
    b.innerHTML=`${ICONS[APPS[it.app].icon]()}<span class="lbl">${it.label}</span>`;
    let clickT;
    b.onclick=()=>{ document.querySelectorAll('.desk-icon').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
      clearTimeout(clickT); clickT=setTimeout(()=>{ openApp(it.app); b.classList.remove('sel'); },120); };
    l.appendChild(b);
  });
}

/* ↓↓↓ BACKEND HOOK: wire this to your Railway/Flask endpoint, Formspree, etc.

   so the demo works; set the URL and it POSTs the full payload as JSON. ↓↓↓ */
const LEAD_ENDPOINT=""; // e.g. "https://your-app.up.railway.app/api/quote"
async function submitQuoteRequest(payload){
  if(LEAD_ENDPOINT){
    const res=await fetch(LEAD_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error('Request failed ('+res.status+')');
    return res.json().catch(()=>({ok:true}));
  }
  console.log('[jorisOS] quote request (no endpoint set):',payload);
  await new Promise(r=>setTimeout(r,500));
  return {ok:true,demo:true};
}

/* "messages" opens a themed chat assistant, the same kind of branded bot Joris
   builds for clients (demo-first). It runs a built-in brain so it works offline /
   when deployed as a static file. To make it a real LLM bot, point CHAT_ENDPOINT
   at your own Flask/Railway endpoint that returns {reply:"..."}, same idea as the
   quote LEAD_ENDPOINT. */
const CHAT_ENDPOINT=""; // e.g. "https://your-app.up.railway.app/api/chat"
const BOT={ history:[], busy:false };
const chatLog=()=>document.querySelector('#chatlog');

RENDER.messages=(body)=>{
  body.innerHTML=`<div class="chat">
    <div class="chat-head">
      <div class="av">${makeIcon(G.chat,'blue',38)}</div>
      <div><div class="nm">Kenai</div><div class="st"><i></i>online · reageert meestal snel</div></div>
    </div>
    <div class="chat-log" id="chatlog"></div>
    <div class="chips" id="chatchips"></div>
    <div class="chat-input">
      <input id="chatfield" placeholder="Vraag over een website, prijzen, alles…" autocomplete="off" aria-label="bericht">
      <button id="chatsend" title="Versturen" onclick="sendChat()">&#10148;</button>
    </div>
  </div>`;
  const f=body.querySelector('#chatfield');
  f.addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
  if(!BOT.history.length){
    botSay("hoi, ik ben Kenai \uD83D\uDC4B het hulpje van Joris hier.\neen nieuwe website, een webshop of een chatbot nodig? vraag me gerust van alles, of kijk even wat het kost.",
      ['Wat kun je maken?','Wat kost het?','Bekijk zijn werk']);
  } else {
    BOT.history.forEach(m=>addBub(m.role,m.html));
    setChips(BOT.lastChips||[]);
  }
  scrollChat(); setTimeout(()=>f&&f.focus(),60);
};
function addBub(role,html){ const log=chatLog(); if(!log)return; const d=el('div','bub '+(role==='me'?'me':'bot'),html); log.appendChild(d); scrollChat(); }
function scrollChat(){ const log=chatLog(); if(log)log.scrollTop=log.scrollHeight+200; }
function setChips(arr){ const c=document.querySelector('#chatchips'); if(!c)return; BOT.lastChips=arr||[];
  c.innerHTML=(arr||[]).map(x=>`<button class="chip">${esc(x)}</button>`).join('');
  c.querySelectorAll('.chip').forEach((b,i)=>b.onclick=()=>sendChat(arr[i])); }
function botTyping(on){ const log=chatLog(); if(!log)return;
  let t=log.querySelector('.chat-typing');
  if(on){ if(!t){ t=el('div','chat-typing','<span></span><span></span><span></span>'); log.appendChild(t); scrollChat(); } }
  else if(t){ t.remove(); } }
function botSay(text,chips,open){
  setChips([]); botTyping(true);
  const delay=Math.min(1100, 320+text.length*7);
  setTimeout(()=>{ botTyping(false);
    const html=text.replace(/\n/g,'<br>');
    addBub('bot',html); BOT.history.push({role:'bot',html});
    setChips(chips||[]); blip(660,.03);
    if(open){ setTimeout(()=>openApp(open), 380); }
  }, delay);
}
async function sendChat(text){
  if(BOT.busy)return;
  const f=document.querySelector('#chatfield');
  const msg=(text!=null?text:(f?f.value:'')).trim();
  if(!msg)return;
  if(f) f.value='';
  addBub('me',esc(msg)); BOT.history.push({role:'me',html:esc(msg)}); setChips([]); scrollChat();
  BOT.busy=true; blip(540,.03);
  try{
    const r = await botReply(msg);
    botSay(r.text, r.chips, r.open);
  }catch(err){
    botSay("oeps, mijn verbinding viel even weg. je kunt Joris altijd direct bereiken via Contact.", ['Open Contact'], null);
  }finally{ BOT.busy=false; }
}
async function botReply(msg){
  if(CHAT_ENDPOINT){
    const res=await fetch(CHAT_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg, history:BOT.history.map(m=>({role:m.role,text:m.html.replace(/<[^>]+>/g,'')}))})});
    if(!res.ok) throw new Error('chat failed');
    const d=await res.json();
    return { text:(d.reply||d.text||'…'), chips:d.chips||[], open:d.open||null };
  }
  await new Promise(r=>setTimeout(r,120));
  return localBotBrain(msg);
}

/* ========================= TERMINAL ========================= */
const TERM_BANNER =
`jorisOS terminal · v4.0
Typ 'help' voor een lijst met commando's.`;
const TERM_HELP = [
  ['help',     'toon deze lijst'],
  ['about',    'wie is Joris'],
  ['projects', 'open Mijn werk'],
  ['services', 'wat ik voor je doe'],
  ['pricing',  'open Prijzen & offerte'],
  ['quote',    'open Prijzen & offerte'],
  ['ask',      'praat met Kenai'],
  ['contact',  'open het contactvenster'],
  ['github',   'open mijn GitHub'],
  ['whoami',   'huidige gebruiker'],
  ['clear',    'maak het scherm leeg']
];
const TERM_STATE = { history:[], hi:-1 };

RENDER.terminal=(body)=>{
  body.innerHTML=`<div class="term" id="termwrap">
    <div id="termout"></div>
    <div class="inputline"><span class="pr">joris@webdev <span class="ac">~</span> $</span><input id="terminput" autocomplete="off" spellcheck="false" aria-label="terminal input"></div>
  </div>`;
  const out=body.querySelector('#termout');
  const input=body.querySelector('#terminput');
  termPrint(out, TERM_BANNER, 'di');
  body.querySelector('#termwrap').addEventListener('mousedown',e=>{ if(e.target.tagName!=='A') setTimeout(()=>input.focus(),0); });
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ const v=input.value; input.value=''; termRun(out,v); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); if(TERM_STATE.history.length){ TERM_STATE.hi=Math.max(0,(TERM_STATE.hi<0?TERM_STATE.history.length:TERM_STATE.hi)-1); input.value=TERM_STATE.history[TERM_STATE.hi]||''; } }
    else if(e.key==='ArrowDown'){ e.preventDefault(); if(TERM_STATE.hi>=0){ TERM_STATE.hi++; if(TERM_STATE.hi>=TERM_STATE.history.length){ TERM_STATE.hi=-1; input.value=''; } else input.value=TERM_STATE.history[TERM_STATE.hi]; } }
  });
  setTimeout(()=>input.focus(),60);
};
function termPrint(out, text, cls){ const d=el('div','ln'+(cls?' '+cls:'')); d.innerHTML=text; out.appendChild(d); const wrap=out.closest('.term'); if(wrap) wrap.scrollTop=wrap.scrollHeight; }
function termRun(out, raw){
  const cmd=(raw||'').trim();
  termPrint(out, `<span class="pr">joris@webdev <span class="ac">~</span> $</span> ${esc(cmd)}`);
  if(cmd){ TERM_STATE.history.push(cmd); TERM_STATE.hi=-1; }
  blip(540,.03);
  const [c,...rest]=cmd.toLowerCase().split(/\s+/);
  switch(c){
    case '': break;
    case 'help':
      termPrint(out, TERM_HELP.map(([k,d])=>`  <span class="ac">${k.padEnd(9)}</span><span class="di">${d}</span>`).join('<br>'));
      break;
    case 'about':
      termPrint(out, `Joris van Rijn, zelfstandig websitemaker in Leiden.<br>Ik bouw snelle, nette websites voor ondernemers in de Randstad.`);
      termPrint(out,'Over mij openen…','di'); openApp('about'); break;
    case 'projects': termPrint(out,'Mijn werk openen…','di'); openApp('projects'); break;
    case 'services': termPrint(out,'Diensten openen…','di'); openApp('services'); break;
    case 'pricing':  termPrint(out,'Prijzen & offerte openen…','di');  openApp('quote');  break;
    case 'quote':    termPrint(out,'Prijzen & offerte openen…','ok'); openApp('quote'); break;
    case 'ask': case 'chat': case 'messages':
      termPrint(out,'Kenai wakker maken…','di'); openApp('messages'); break;
    case 'contact':  termPrint(out,'Contact openen…','di'); openApp('contact'); break;
    case 'github':   termPrint(out,`open <a href="${CONTACT.github}" target="_blank" rel="noopener">${CONTACT.github}</a>`,'di'); window.open(CONTACT.github,'_blank','noopener'); break;
    case 'whoami':   termPrint(out,'gast, maar je zou klant kunnen worden. Probeer <span class="ac">quote</span>.'); break;
    case 'ls':       termPrint(out,'about  projects  services  pricing  quote  ask  contact','di'); break;
    case 'sudo':     termPrint(out,'leuk geprobeerd. Dit OS draait op goede koffie, niet op root-rechten. ☕','di'); break;
    case 'clear':    out.innerHTML=''; break;
    default:
      termPrint(out, `onbekend commando: ${esc(c)}. Typ <span class="ac">help</span>`,'di');
  }
}

const MENUS={
  file:{ title:'Menu', items:[
    {label:'Prijzen & offerte', k:'⌘Q', act:()=>openApp('quote')},
    {label:'Stel Kenai een vraag', k:'', act:()=>openApp('messages')},

    {label:'Download cv (.txt)', k:'', act:()=>downloadFile('CV-Joris-van-Rijn.txt', cvText())}
  ]},

    {label:'Open Terminal', k:'', act:()=>openApp('terminal')},
    {label:'Over deze site', k:'', act:()=>openApp('about')},

    {label:'Geluid aan/uit', k:'', act:()=>toggleSound()}
  ]}
};
let openMenu=null;
function buildMenuPanel(key){
  const def=MENUS[key]; if(!def)return null;
  const panel=el('div','mb-menu'); panel.id='menu-'+key;
  let items=def.items;
  if(items==='DYNAMIC'){
    const opened=openOrder.filter(id=>WIN[id]);
    items=[{label:'Alles minimaliseren', k:'', act:()=>opened.forEach(id=>minWin(id))},
           {label:'Alles sluiten', k:'', act:()=>opened.slice().forEach(id=>closeWin(id))}, 'div'];
    if(opened.length){ items.push('HEAD:Open vensters');
      opened.forEach(id=>items.push({label:APPS[id].title, k:'', act:()=>{ if(WIN[id]&&WIN[id].minned)restoreWin(id); else focusWin(id);} }));
    } else { items.push({label:'Geen open vensters', k:'', dim:true, act:()=>{}}); }
  }
  items.forEach(it=>{
    if(it==='div'){ panel.appendChild(el('div','div')); return; }
    if(typeof it==='string'&&it.startsWith('HEAD:')){ panel.appendChild(el('div','head',it.slice(5))); return; }
    const b=el('button',null,`<span>${it.label}</span>${it.k?`<span class="k">${it.k}</span>`:''}`);
    if(it.dim)b.style.opacity='.5';
    b.onclick=()=>{ closeMenus(); it.act&&it.act(); };
    panel.appendChild(b);
  });
  return panel;
}
function openMenuFor(item){
  closeMenus();
  const key=item.dataset.menu;
  const panel=buildMenuPanel(key); if(!panel)return;
  item.classList.add('open');
  const r=item.getBoundingClientRect();
  panel.style.left=r.left+'px'; panel.style.top=(r.bottom+4)+'px';
  document.body.appendChild(panel);
  openMenu={item,panel,key};
  blip(700,.03);
}
function closeMenus(){ if(openMenu){ openMenu.item.classList.remove('open'); openMenu.panel.remove(); openMenu=null; } }
function wireMenus(){
  document.querySelectorAll('.mb-item[data-menu]').forEach(item=>{
    item.addEventListener('click',e=>{ e.stopPropagation(); if(openMenu&&openMenu.item===item){ closeMenus(); } else { openMenuFor(item); } });
    item.addEventListener('mouseenter',()=>{ if(openMenu&&openMenu.item!==item){ openMenuFor(item); } });
  });
  document.addEventListener('click',e=>{ if(openMenu&&!e.target.closest('.mb-menu')&&!e.target.closest('.mb-item')) closeMenus(); });
}

/* ========================= CLOCK ========================= */
function startClock(){
  const c=$('#clock'); if(!c)return;
  const tick=()=>{ const d=new Date();
    const day=d.toLocaleDateString('en-GB',{weekday:'short'});
    const t=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    c.textContent=`${day} ${t}`; };
  tick(); setInterval(tick,1000*15); setTimeout(tick, (60-new Date().getSeconds())*1000);
}

/* ========================= SOUND + TOAST ========================= */
let _audio=null;
function blip(freq=600, gain=.04){
  if(!STATE.sound) return;
  try{
    _audio=_audio||new (window.AudioContext||window.webkitAudioContext)();
    if(_audio.state==='suspended')_audio.resume();
    const o=_audio.createOscillator(), g=_audio.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,_audio.currentTime);
    g.gain.linearRampToValueAtTime(gain,_audio.currentTime+.008);
    g.gain.exponentialRampToValueAtTime(.0001,_audio.currentTime+.14);
    o.connect(g); g.connect(_audio.destination);
    o.start(); o.stop(_audio.currentTime+.16);
  }catch(e){}
}
function toast(msg){
  const host=$('#toasts'); if(!host)return;
  const t=el('div','toast',esc(msg)); host.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('in'));
  setTimeout(()=>{ t.classList.remove('in'); setTimeout(()=>t.remove(),260); }, 2300);
}

function runBoot(done){

  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){ boot.classList.add('gone'); setTimeout(done,150); return; }
  blip(440,.04);
  setTimeout(()=>{ if(bar) bar.style.width='100%'; }, 200);
  setTimeout(()=>{ s1.classList.remove('active');
    setTimeout(()=>{ s2.classList.add('active'); blip(620,.05); }, 420);
  }, 1950);
  setTimeout(()=>{ boot.classList.add('gone'); blip(720,.05); setTimeout(done,520); }, 3550);
}

/* ===== sound primer (browsers require a gesture before audio) ===== */
function primeAudio(){ try{ _audio=_audio||new (window.AudioContext||window.webkitAudioContext)(); if(_audio.state==='suspended')_audio.resume(); }catch(e){} }

/* ===== ClickSpark (ReactBits-style) ===== */
function initClickSpark(){
  const cv=document.getElementById('spark-canvas'); if(!cv) return; const ctx=cv.getContext('2d');
  function resize(){ const dpr=Math.min(devicePixelRatio||1,2); cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  resize(); addEventListener('resize',resize);
  const COLOR='#ffffff', COUNT=8, SIZE=11, RADIUS=18, DUR=420; let sparks=[];
  addEventListener('pointerdown',e=>{ const t=performance.now(); for(let i=0;i<COUNT;i++) sparks.push({x:e.clientX,y:e.clientY,a:(2*Math.PI*i)/COUNT,t}); });
  const ease=t=>1-Math.pow(1-t,3);
  (function frame(now){ ctx.clearRect(0,0,innerWidth,innerHeight); ctx.lineWidth=2; ctx.lineCap='round';
    sparks=sparks.filter(s=>now-s.t<=DUR);
    for(const s of sparks){ const pr=ease((now-s.t)/DUR), dist=pr*RADIUS, len=SIZE*(1-pr);
      const x1=s.x+dist*Math.cos(s.a), y1=s.y+dist*Math.sin(s.a), x2=s.x+(dist+len)*Math.cos(s.a), y2=s.y+(dist+len)*Math.sin(s.a);
      ctx.strokeStyle=COLOR; ctx.globalAlpha=Math.max(0,1-pr); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
    ctx.globalAlpha=1; requestAnimationFrame(frame); })(performance.now());
}

/* ===== Noise overlay (ReactBits-style grain) ===== */
function initNoise(){
  const cv=document.getElementById('noise-canvas'); if(!cv) return; const ctx=cv.getContext('2d');
  const PS=128, ALPHA=16, REFRESH=2; const pat=document.createElement('canvas'); pat.width=pat.height=PS; const pctx=pat.getContext('2d');
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; } resize(); addEventListener('resize',resize);
  function mk(){ const id=pctx.createImageData(PS,PS), d=id.data; for(let i=0;i<d.length;i+=4){ const v=Math.random()*255|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=ALPHA; } pctx.putImageData(id,0,0); }
  let f=0, pattern=null;
  (function frame(){ if(f%REFRESH===0){ mk(); pattern=ctx.createPattern(pat,'repeat'); } ctx.clearRect(0,0,cv.width,cv.height); if(pattern){ ctx.fillStyle=pattern; ctx.fillRect(0,0,cv.width,cv.height); } f++; requestAnimationFrame(frame); })();
}

/* ===== Grid Distortion background (ReactBits/akella-style, Three.js) ===== */
function initGridDistortion(){
  const cv=document.getElementById('gd-canvas'); if(!cv || !window.THREE) return; const THREE=window.THREE;
  const GRID=20, MOUSE=0.3, STRENGTH=0.15, RELAX=0.92;
  const renderer=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
  const scene=new THREE.Scene(); const cam=new THREE.OrthographicCamera(-0.5,0.5,0.5,-0.5,-10,10); cam.position.z=2;
  const tc=document.createElement('canvas'); tc.width=tc.height=1024; const g=tc.getContext('2d');
  const grad=g.createLinearGradient(0,0,0,1024); grad.addColorStop(0,'#3f86dc'); grad.addColorStop(.5,'#2f74d4'); grad.addColorStop(1,'#1f5cc0'); g.fillStyle=grad; g.fillRect(0,0,1024,1024);
  const rg=g.createRadialGradient(512,40,0,512,40,780); rg.addColorStop(0,'rgba(120,170,235,.6)'); rg.addColorStop(1,'rgba(120,170,235,0)'); g.fillStyle=rg; g.fillRect(0,0,1024,1024);
  g.strokeStyle='rgba(255,255,255,.10)'; g.lineWidth=2; const step=1024/24;
  for(let i=0;i<=24;i++){ g.beginPath(); g.moveTo(i*step,0); g.lineTo(i*step,1024); g.stroke(); g.beginPath(); g.moveTo(0,i*step); g.lineTo(1024,i*step); g.stroke(); }
  const tex=new THREE.CanvasTexture(tc); tex.minFilter=THREE.LinearFilter;
  const size=GRID, arr=new Float32Array(4*size*size); const data=new THREE.DataTexture(arr,size,size,THREE.RGBAFormat,THREE.FloatType); data.needsUpdate=true;
  const uniforms={ uTexture:{value:tex}, uDataTexture:{value:data}, resolution:{value:new THREE.Vector4(1,1,1,1)} };
  const mat=new THREE.ShaderMaterial({ uniforms,
    vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader:'uniform sampler2D uTexture; uniform sampler2D uDataTexture; uniform vec4 resolution; varying vec2 vUv; void main(){ vec2 uv=(vUv-0.5)*resolution.zw+0.5; vec4 off=texture2D(uDataTexture,vUv); gl_FragColor=texture2D(uTexture,uv-0.03*off.rg); }' });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(1,1,1,1),mat));
  const mouse={x:.5,y:.5,px:.5,py:.5,vx:0,vy:0}; let W=1,H=1; const imgAspect=1;
  function resize(){ W=innerWidth; H=innerHeight; renderer.setSize(W,H,false); const ha=H/W; let a1,a2; if(ha>imgAspect){a1=(W/H)*imgAspect; a2=1;} else {a1=1; a2=ha/imgAspect;} uniforms.resolution.value.set(W,H,a1,a2); }
  resize(); addEventListener('resize',resize);
  addEventListener('mousemove',e=>{ mouse.x=e.clientX/W; mouse.y=e.clientY/H; mouse.vx=mouse.x-mouse.px; mouse.vy=mouse.y-mouse.py; mouse.px=mouse.x; mouse.py=mouse.y; });
  function upd(){ const d=data.image.data; for(let i=0;i<d.length;i++) d[i]*=RELAX;
    const gx=size*mouse.x, gy=size*(1-mouse.y), maxd=size*MOUSE, aspect=H/W;
    for(let i=0;i<size;i++) for(let j=0;j<size;j++){ const dist=Math.pow(gx-i,2)/aspect+Math.pow(gy-j,2);
      if(dist<maxd*maxd){ const idx=4*(i+size*j); let pw=maxd/Math.max(Math.sqrt(dist),0.5); pw=Math.min(pw,10); d[idx]+=STRENGTH*100*mouse.vx*pw; d[idx+1]-=STRENGTH*100*mouse.vy*pw; } }
    mouse.vx*=0.9; mouse.vy*=0.9; data.needsUpdate=true; }
  (function frame(){ upd(); renderer.render(scene,cam); requestAnimationFrame(frame); })();
}

function init(){
  $('#wallpaper') && setWall(STATE.wallpaper);
  buildDock();
  buildDesktop();
  wireMenus();
  startClock();
  $('#sndtoggle') && ($('#sndtoggle').onclick=()=>toggleSound());
  $('#sndtoggle') && ($('#sndtoggle').innerHTML = STATE.sound?'\u{1F50A}':'\u{1F507}');
  ['pointerdown','keydown'].forEach(ev=>addEventListener(ev,primeAudio,{once:true}));
  try{ initGridDistortion(); }catch(e){}
  initNoise(); initClickSpark();

  // keyboard: Escape closes menus then focused window
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if(openMenu){ closeMenus(); return; }
      const focused=Object.keys(WIN).find(id=>WIN[id].node.classList.contains('focused'));
      if(focused) closeWin(focused);
    }
  });

  runBoot(()=>{
    if(!isMobile()){
      const W=window.innerWidth, H=window.innerHeight;
      openApp('services',{left:Math.round(W*0.46), top:Math.round(H*0.10), w:Math.min(690,Math.round(W*0.40)), h:Math.min(600,H-200)});
      openApp('projects',{left:Math.round(W*0.50), top:Math.round(H*0.62), w:600, h:330});
      openApp('welcome', {left:Math.round(W*0.155), top:Math.round(H*0.28), w:560, h:Math.min(560,H-160)});
      focusWin('welcome');
    } else openApp('welcome');
    toast('Welkom \u00b7 typ \u2018help\u2019 in Terminal voor de techneuten');
  });
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
